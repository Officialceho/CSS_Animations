<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Loading Animation</title>
	<link rel="stylesheet" href="animate.css">
</head>
<body>
    <div class="loader">
	<span class="loading-text">Loading...</span>
	<span class="animate-me" style="--i:1;"></span>
	<span class="animate-me" style="--i:2;"></span>
	<span class="animate-me" style="--i:3;"></span>
	<span class="animate-me" style="--i:4;"></span>
	<span class="animate-me" style="--i:5;"></span>
	<span class="animate-me" style="--i:6;"></span>
	<span class="animate-me" style="--i:7;"></span>
	<span class="animate-me" style="--i:8;"></span>
	



    </div>
</body>
</html>
